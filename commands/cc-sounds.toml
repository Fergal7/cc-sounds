description = "Configure cc-sounds notifications — mute, per-event toggle, custom sound, taskbar flash"
prompt = """Run the cc-sounds settings helper and report the result concisely.

Run this exact command, passing the user's arguments through verbatim (if the user gave no arguments, use `status`):

powershell -NoProfile -File "${CLAUDE_PLUGIN_ROOT}/scripts/cc-sounds-config.ps1" $ARGUMENTS

Then summarise the resulting settings in one or two lines: master mute state, taskbar flash state, and any per-event enable/disable or custom-sound change. If the helper printed a line starting with `ERROR:`, show it verbatim along with the correct usage.

Valid events: Stop, StopFailure, PermissionRequest, Elicitation.
Examples: `/cc-sounds mute`, `/cc-sounds unmute`, `/cc-sounds flash off`, `/cc-sounds event Stop off`, `/cc-sounds sound Stop tada.wav`, `/cc-sounds reset`."""
